version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - MIRROR_CAMERA_INDEX=${MIRROR_CAMERA_INDEX:-0}
      - MIRROR_WIDTH=${MIRROR_WIDTH:-640}
      - MIRROR_HEIGHT=${MIRROR_HEIGHT:-480}
      - MIRROR_FPS=${MIRROR_FPS:-15}
    # カメラをDocker内で使う場合 (Linux ネイティブのみ):
    #   devices:
    #     - /dev/video0:/dev/video0
    #   group_add:
    #     - video
    # Mac Studio本番環境ではバックエンドをネイティブ実行推奨

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
